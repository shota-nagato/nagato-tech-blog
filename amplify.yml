version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.22.0
        - pnpm install --frozen-lockfile
        - pnpm rebuild sharp
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
